<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TapPay | Terminal</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
.mono { font-family: 'JetBrains Mono', monospace; }
.glass { background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
.scanner-ring { animation: ripple 2s infinite; }
@keyframes ripple { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
</style>
</head>
<body class="text-slate-900 min-h-screen">

<!-- LOGIN OVERLAY -->
<div id="login-overlay" class="fixed inset-0 bg-slate-900 bg-opacity-95 flex items-center justify-center z-[200]">
    <div class="bg-white rounded-3xl p-8 w-[360px] flex flex-col gap-6 shadow-2xl">
        <h2 class="text-2xl font-bold text-slate-900 text-center">Terminal Login</h2>
        <input type="text" id="login-uid" placeholder="Username" class="w-full p-4 rounded-2xl border ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 outline-none font-semibold">
        <input type="password" id="login-pass" placeholder="PIN" class="w-full p-4 rounded-2xl border ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600 outline-none font-semibold">
        <button onclick="login()" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl hover:bg-indigo-700 transition-all active:scale-[0.98]">LOGIN</button>
        <div id="login-msg" class="text-rose-500 text-sm text-center hidden"></div>
    </div>
</div>

<div class="max-w-7xl mx-auto p-4 md:p-8">
    <!-- HEADER -->
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10">
        <h1 class="text-2xl font-800 tracking-tight flex items-center gap-2">
            TAP<span class="text-indigo-600 font-black italic">PAY</span>
        </h1>
    </header>

    <section class="grid grid-cols-1 md:grid-cols-2 gap-6" id="products-grid">
        <template id="product-card-template">
            <div class="border rounded-2xl overflow-hidden shadow hover:shadow-lg transition cursor-pointer flex flex-col">
                <img src="" alt="Product Image" class="w-full h-36 object-cover">
                <div class="p-4 flex flex-col gap-2">
                    <h4 class="font-semibold text-slate-900 text-lg"></h4>
                    <p class="text-slate-500 text-sm">Price: <span class="font-bold">0</span> RWF</p>
                    <button class="py-2 bg-indigo-600 text-white rounded-2xl hover:bg-indigo-700 transition">Buy</button>
                </div>
            </div>
        </template>
    </section>
</div>

<script>
lucide.createIcons();
const socket = io(); // Socket.IO connection

// Products
const products = [
    { name: "Product A", price: 500, img: "https://picsum.photos/id/1011/400/300" },
    { name: "Product B", price: 1200, img: "https://picsum.photos/id/1012/400/300" },
    { name: "Product C", price: 800, img: "https://picsum.photos/id/1013/400/300" },
    { name: "Product D", price: 1500, img: "https://picsum.photos/id/1015/400/300" },
];

// Render products
const grid = document.getElementById('products-grid');
const template = document.getElementById('product-card-template');
products.forEach(p => {
    const clone = template.content.cloneNode(true);
    clone.querySelector('img').src = p.img;
    clone.querySelector('h4').innerText = p.name;
    clone.querySelector('span').innerText = p.price.toLocaleString();
    clone.querySelector('button').onclick = () => alert(`Buying ${p.name} for ${p.price} RWF`);
    grid.appendChild(clone);
});

// LOGIN FUNCTION
window.login = async function() {
    const uid = document.getElementById('login-uid').value.trim();
    const pass = document.getElementById('login-pass').value.trim();
    const msg = document.getElementById('login-msg');

    if (!uid || !pass) {
        msg.innerText = "Username and PIN required";
        msg.classList.remove('hidden');
        return;
    }

    try {
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ uid, passcode: pass })
        });
        const data = await res.json();

        if (data.success) {
            document.getElementById('login-overlay').classList.add('hidden');
            alert(`Logged in as ${uid}`);
        } else {
            msg.innerText = data.error || "Login failed";
            msg.classList.remove('hidden');
        }
    } catch (err) {
        msg.innerText = "Server error";
        msg.classList.remove('hidden');
        console.error(err);
    }
};
</script>
</body>
</html>
